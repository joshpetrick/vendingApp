<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Manage Snacks</title></head>
<body>
<h1>Manage Snacks</h1>
<p><a th:href="@{/admin}">Back to admin home</a></p>
<h2>Add snack</h2>
<form method="post" th:action="@{/admin/items}">
  <label>Name <input name="name" required></label>
  <label>Barcode <input name="barcode" required></label>
  <label>Price <input name="price" type="number" step="0.25" value="0.75" required></label>
  <label>Image URL <input name="imageUrl" maxlength="500"></label>
  <label>Active <input name="active" type="checkbox" value="true" checked></label>
  <button type="submit">Create snack</button>
</form>
<h2>Existing snacks</h2>
<table>
  <thead><tr><th>Name</th><th>Barcode</th><th>Price</th><th>Image URL</th><th>Active</th><th>Actions</th></tr></thead>
  <tbody>
  <tr th:each="item : ${items}">
    <form method="post" th:action="@{/admin/items}">
      <td><input name="name" th:value="${item.name}" required></td>
      <td><input name="barcode" th:value="${item.barcode}" required></td>
      <td><input name="price" type="number" step="0.25" th:value="${item.price}" required></td>
      <td><input name="imageUrl" maxlength="500" th:value="${item.imageUrl}"></td>
      <td><input name="active" type="checkbox" value="true" th:checked="${item.active}"></td>
      <td>
        <input name="id" type="hidden" th:value="${item.id}">
        <button type="submit">Save</button>
      </td>
    </form>
    <td>
      <form method="post" th:action="@{/admin/items/{id}/delete(id=${item.id})}"><button type="submit">Delete</button></form>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
