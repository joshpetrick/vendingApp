<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SnackLedger Kiosk Display</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #101820;
      color: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
    }

    .logout-link {
      background: rgb(15 23 42 / 75%);
      border: 1px solid rgb(148 163 184 / 35%);
      border-radius: 999px;
      color: #cbd5e1;
      font-size: .9rem;
      padding: .35rem .7rem;
      position: fixed;
      right: .75rem;
      text-decoration: none;
      top: .75rem;
      z-index: 10;
    }

    .logout-link:focus,
    .logout-link:hover {
      color: #fff;
      border-color: #38bdf8;
    }

    main {
      display: grid;
      gap: .75rem;
      grid-template-rows: .9fr 1.1fr;
      height: 100vh;
      min-height: 0;
      padding: .75rem;
    }

    section {
      background: #172033;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgb(0 0 0 / 35%);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    h2 {
      background: #1e293b;
      font-size: 1.35rem;
      line-height: 1.1;
      margin: 0;
      padding: .45rem 1rem;
    }

    .page {
      display: none;
      gap: .6rem;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, minmax(0, 1fr));
      height: 100%;
      min-height: 0;
      padding: .6rem;
    }

    .page.active {
      display: grid;
    }

    .card {
      align-items: center;
      background: #0f172a;
      border: 1px solid rgb(148 163 184 / 25%);
      border-radius: .8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
      padding: .35rem;
      text-align: center;
    }

    .name {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.1;
      padding: 0 .5rem;
    }

    .amount {
      color: #86efac;
      font-size: 1.8rem;
      font-weight: 800;
      margin-top: .25rem;
    }

    .amount.negative {
      color: #f87171;
    }

    .snack-image {
      height: auto;
      margin: .25rem 0;
      max-height: 70px;
      max-width: 110px;
      object-fit: contain;
      width: auto;
    }

    .inactive {
      opacity: .5;
      text-decoration: line-through;
    }

    .meta {
      color: #cbd5e1;
      font-size: 1.1rem;
    }
  </style>
</head>
<body th:attr="data-balance-interval=${balancePageMillis},data-snack-interval=${snackPageMillis}">
<a class="logout-link" th:href="@{/logout}">Log out</a>
<main>
  <section aria-label="User balances">
    <h2>Account Balances</h2>
    <div class="page balance-page"
         th:each="pageStart : ${#numbers.sequence(0, users.size() == 0 ? 0 : users.size() - 1, cardsPerPage)}"
         th:classappend="${pageStart == 0} ? ' active'">
      <div class="card"
           th:each="user : ${users.subList(pageStart, T(java.lang.Math).min(pageStart + cardsPerPage, users.size()))}"
           th:classappend="${user.active} ? '' : ' inactive'">
        <div class="name" th:text="${user.displayName}">alex</div>
        <div class="amount"
             th:classappend="${user.balance.signum() < 0} ? ' negative'"
             th:text="${#numbers.formatCurrency(user.balance)}">$0.00</div>
      </div>
    </div>
  </section>

  <section aria-label="Snack prices">
    <h2>Snack Prices</h2>
    <div class="page snack-page"
         th:each="pageStart : ${#numbers.sequence(0, items.size() == 0 ? 0 : items.size() - 1, cardsPerPage)}"
         th:classappend="${pageStart == 0} ? ' active'">
      <div class="card"
           th:each="item : ${items.subList(pageStart, T(java.lang.Math).min(pageStart + cardsPerPage, items.size()))}"
           th:classappend="${item.active} ? '' : ' inactive'">
        <div class="name" th:text="${item.name}">Snack</div>
        <img class="snack-image" th:if="${item.imageUrl != null}" th:src="@{${item.imageUrl}}" alt="" loading="lazy">
        <div class="amount" th:text="${#numbers.formatCurrency(item.price)}">$0.00</div>
      </div>
    </div>
  </section>
</main>
<script>
  function rotatePages(selector, intervalMillis) {
    const pages = Array.from(document.querySelectorAll(selector));
    if (pages.length <= 1) {
      return;
    }
    let current = 0;
    setInterval(() => {
      pages[current].classList.remove('active');
      current = (current + 1) % pages.length;
      pages[current].classList.add('active');
    }, intervalMillis);
  }

  const balanceInterval = Number(document.body.dataset.balanceInterval || 5000);
  const snackInterval = Number(document.body.dataset.snackInterval || 5000);
  rotatePages('.balance-page', balanceInterval);
  rotatePages('.snack-page', snackInterval);
</script>
</body>
</html>
